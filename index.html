<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Painel de Retenção · wil</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>

<style>
/* =========================================================================
   CONFIG — edite aqui sem mexer no resto do arquivo
   ========================================================================= */
</style>

<style>
:root {
  --bg: #0d1117;
  --panel: #161c26;
  --panel-alt: #1b2230;
  --panel-border: #262e3d;
  --text: #e7eaee;
  --text-muted: #8b95a5;
  --accent: #f2b705;
  --accent-dim: #a67d05;
  --good: #3fa796;
  --warn: #e2a33d;
  --risk: #e2543d;
  --grid-line: #1d2430;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; }
.app { padding: 24px; min-height: 100vh; }
@media (min-width: 900px) { .app { padding: 40px; } }
.hidden { display: none !important; }

/* ---- password gate ---- */
#gate {
  position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center;
  z-index: 50; flex-direction: column; gap: 16px; padding: 24px; text-align: center;
}
#gate .lock-emoji { font-size: 34px; }
#gate h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; margin: 0; }
#gate p { color: var(--text-muted); font-size: 13px; max-width: 320px; margin: 0; }
#gate input {
  background: var(--panel); border: 1px solid var(--panel-border); color: var(--text);
  padding: 10px 14px; border-radius: 8px; font-size: 14px; width: 240px; text-align: center;
}
#gate button {
  background: var(--accent); color: #17140a; font-weight: 600; border: none; border-radius: 8px;
  padding: 10px 22px; cursor: pointer; font-size: 14px;
}
#gate .gate-error { color: var(--risk); font-size: 12px; min-height: 16px; }

/* ---- panel/card ---- */
.panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 10px; padding: 18px; }

/* ---- header ---- */
.topbar { display: flex; flex-direction: column; gap: 16px; margin-bottom: 28px; }
@media (min-width: 900px) { .topbar { flex-direction: row; align-items: flex-end; justify-content: space-between; } }
.brand-eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
.brand-title { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.brand-sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
.btn {
  display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #17140a;
  font-weight: 600; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
}
.btn:hover { filter: brightness(1.08); }
.btn.secondary { background: var(--panel-alt); color: var(--text); border: 1px solid var(--panel-border); }

.source-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
.source-chip { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--panel-border); border-radius: 999px; padding: 7px 14px; font-size: 13px; }
.source-chip.ok { border-color: rgba(63,167,150,0.4); }
.source-chip.err { border-color: rgba(226,84,61,0.5); }
.source-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); }
.source-chip.ok .dot { background: var(--good); }
.source-chip.err .dot { background: var(--risk); }
.source-chip .sub { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; }

.error-banner { background: rgba(226,84,61,0.12); border: 1px solid rgba(226,84,61,0.4); color: #ffb4a3; padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
.empty-hero { text-align: center; padding: 80px 24px; border: 1px dashed var(--panel-border); border-radius: 14px; }
.empty-hero h3 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; margin-bottom: 8px; }
.empty-hero p { color: var(--text-muted); max-width: 480px; margin: 0 auto 20px; }
.empty-hero code { background: var(--panel-alt); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

.kpi-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 28px; }
@media (min-width: 900px) { .kpi-grid { grid-template-columns: repeat(4, 1fr); } }
.kpi { display: flex; flex-direction: column; gap: 6px; }
.kpi-top { display: flex; align-items: center; justify-content: space-between; }
.kpi-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.kpi-value { font-family: 'Space Grotesk', sans-serif; font-size: 30px; font-weight: 700; }
.kpi-sub { font-size: 12px; color: var(--text-muted); }

.section { margin-bottom: 36px; }
.section-title { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
.eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.section-title h2 { font-family: 'Space Grotesk', sans-serif; font-size: 20px; margin: 0; }

.tab-row { display: flex; gap: 6px; }
.tab-btn { background: transparent; border: 1px solid var(--panel-border); color: var(--text-muted); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
.tab-btn.active { background: var(--panel-alt); color: var(--text); border-color: var(--accent-dim); }

.heatmap-wrap { overflow-x: auto; }
.heatmap-grid { display: flex; gap: 3px; padding-bottom: 8px; }
.heatmap-col { display: flex; flex-direction: column; gap: 3px; }
.heatmap-cell { width: 11px; height: 11px; border-radius: 2px; }
.heatmap-legend { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-muted); margin-top: 8px; }
.heatmap-legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

.cohort-scroll { overflow-x: auto; }
.cohort-table { border-collapse: collapse; width: 100%; font-size: 13px; }
.cohort-table th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
.cohort-table td { padding: 8px 10px; }
.cohort-row-label { font-weight: 600; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
.cohort-size { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
.cohort-cell { text-align: center; font-family: 'JetBrains Mono', monospace; border-radius: 4px; }

.toggle-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); cursor: pointer; user-select: none; }
.toggle-switch { width: 34px; height: 18px; border-radius: 999px; background: var(--panel-border); position: relative; transition: background 0.15s; }
.toggle-switch.on { background: var(--accent-dim); }
.toggle-knob { width: 14px; height: 14px; border-radius: 50%; background: var(--text); position: absolute; top: 2px; left: 2px; transition: transform 0.15s; }
.toggle-switch.on .toggle-knob { transform: translateX(16px); background: var(--accent); }

.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
.filter-select, .filter-input { background: var(--panel-alt); border: 1px solid var(--panel-border); color: var(--text); padding: 7px 10px; border-radius: 6px; font-size: 13px; }
.filter-input { flex: 1; min-width: 160px; }
.bucket-pill { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; }

.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th { text-align: left; padding: 8px 10px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--panel-border); position: sticky; top: 0; background: var(--panel); }
.data-table td { padding: 8px 10px; border-bottom: 1px solid var(--grid-line); }
.data-table tr:hover td { background: var(--panel-alt); }
.table-scroll { max-height: 420px; overflow-y: auto; }

.campaign-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
.campaign-card { padding: 14px; background: var(--panel-alt); border-radius: 10px; }
.campaign-card h4 { font-size: 13px; margin: 0 0 10px 0; font-family: 'Space Grotesk', sans-serif; }
.campaign-metric-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); padding: 3px 0; }
.campaign-metric-row b { color: var(--text); font-family: 'JetBrains Mono', monospace; }

.chart-wrap { position: relative; height: 260px; }
.footer-note { color: var(--text-muted); font-size: 11px; text-align: center; margin-top: 40px; }
.spin { animation: spin 1s linear infinite; display: inline-block; }
@keyframes spin { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
</style>
</head>
<body>

<!-- ============================= PASSWORD GATE ============================= -->
<div id="gate">
  <div class="lock-emoji">🔒</div>
  <h1>Painel de Retenção · wil</h1>
  <p>Acesso autorizado apenas ao time interno. Dados protegidos conforme LGPD.</p>
  <input id="gate-input" type="password" placeholder="Senha de acesso" autocomplete="off" />
  <button id="gate-btn" class="btn">Entrar</button>
  <div class="gate-error" id="gate-error"></div>
</div>

<!-- ============================= APP ============================= -->
<div class="app hidden" id="app">
  <div class="topbar">
    <div>
      <div class="brand-eyebrow">Wily · CS &amp; Growth</div>
      <h1 class="brand-title">Painel de Retenção</h1>
      <div class="brand-sub" id="brand-sub">Cohort, retenção, risco de churn e impacto de campanhas — atualizado direto das fontes.</div>
    </div>
    <button class="btn" id="refresh-btn">↻ Atualizar dados</button>
  </div>

  <div id="error-area"></div>
  <div class="source-row" id="source-row"></div>
  <div id="content"></div>

  <div class="footer-note">Dados: ID interno e primeiro nome apenas · Uso interno · LGPD</div>
</div>

<script>
/* =========================================================================
   ⚙️ CONFIGURAÇÃO — edite só esta parte pra ligar/desligar fontes de dados
   ========================================================================= */
const CONFIG = {
  // Senha de acesso ao painel (mesma lógica do dashboard_campanhas.html — troque aqui).
  password: "wil2026",

  // Arquivo de Vistorias: fica DENTRO deste mesmo repositório, pasta /data.
  // Para atualizar: suba um novo arquivo substituindo data/vistorias.csv no GitHub
  // (botão "Add file" > "Upload files" na tela do repositório).
  vistoriasCsvPath: "./data/vistorias.csv",

  // Cadastro de Wilys (opcional). Se não usar, deixe cadastroSheetId como "".
  // Como pegar o ID e o GID: abra a aba no Google Sheets e olhe a URL:
  // https://docs.google.com/spreadsheets/d/ESSE_TRECHO_E_O_ID/edit#gid=ESSE_NUMERO_E_O_GID
  // A planilha precisa estar compartilhada como "Qualquer pessoa com o link (Leitor)".
  cadastroSheetId: "",
  cadastroGid: "0",

  // Campanhas (opcional) — pode apontar pra mesma planilha que vocês já usam.
  campanhasSheetId: "",
  campanhasGid: "0",
};

/* =========================================================================
   UTILITIES
   ========================================================================= */
const stripAccents = (s) => (s ? String(s).normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "");
const normKey = (s) => stripAccents(s).toUpperCase().replace(/[^A-Z0-9]+/g, "_").replace(/^_+|_+$/g, "");
const normName = (s) => stripAccents(String(s || "")).trim().toLowerCase().replace(/\s+/g, " ");

function parseNum(v) {
  if (v === undefined || v === null || v === "") return null;
  const s = String(v).trim().replace(/,/g, "");
  const n = parseFloat(s);
  return isNaN(n) ? null : n;
}
function parseDateSafe(v) {
  if (!v) return null;
  const s = String(v).trim().replace(" ", "T");
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
const DAY_MS = 86400000;
function dateKey(d) { return d.toISOString().slice(0, 10); }
function daysBetween(a, b) { return (b.getTime() - a.getTime()) / DAY_MS; }
function mondayOfWeek(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const monday = new Date(d);
  monday.setDate(d.getDate() + diff);
  monday.setHours(0, 0, 0, 0);
  return monday;
}
function weekKey(d) { return dateKey(mondayOfWeek(d)); }
function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }
function monthLabel(mk) {
  const [y, m] = mk.split("-");
  const names = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  return `${names[parseInt(m, 10) - 1]}/${y.slice(2)}`;
}
function mode(arr) {
  const counts = new Map(); let best = null, bestN = 0;
  for (const v of arr) { if (!v) continue; const n = (counts.get(v) || 0) + 1; counts.set(v, n); if (n > bestN) { bestN = n; best = v; } }
  return best;
}
function fmtInt(n) { return n === null || n === undefined || isNaN(n) ? "—" : Math.round(n).toLocaleString("pt-BR"); }
function fmtPct(n) { return n === null || n === undefined || isNaN(n) ? "—" : `${n.toFixed(1)}%`; }
function esc(s) { const d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }

/* =========================================================================
   FIELD MAPPING / DETECTION  (mesma lógica validada no protótipo)
   ========================================================================= */
const VISTORIA_FIELDS = {
  CLIENTE: ["CLIENTE"], POLO: ["POLO"], OPERADOR: ["OPERADOR"], WILY: ["WILY"],
  NUMERO_OS: ["NUMERO_OS", "NUMERO OS"], BAIRRO: ["BAIRRO"], CIDADE: ["CIDADE"], ESTADO: ["ESTADO"],
  CATEGORIA: ["CATEGORIA"], TIPO: ["TIPO"], VISTORIADO_EM: ["VISTORIADO_EM", "VISTORIADO EM"],
  FINALIZADO_EM: ["FINALIZADO_EM", "FINALIZADO EM"], DIAGNOSTICO: ["DIAGNOSTICO"],
};
const CADASTRO_FIELDS = {
  WILLY_ID: ["WILLY_ID"], NOME_WILLY: ["NOME_WILLY"], EMAIL: ["EMAIL"],
  TOTAL_VISTORIAS: ["TOTAL_VISTORIAS"], DIAS_SEM_VISTORIA: ["DIAS_SEM_VISTORIA"], DATA_CADASTRO: ["DATA_CADASTRO"],
};
const CAMPANHA_FIELDS = {
  ID: ["ID"], FULL_NAME: ["FULL_NAME", "WILY", "NOME", "NOME_COMPLETO", "PRIMEIRO_NOME"], EMAIL: ["EMAIL"],
  NAME: ["NAME", "CAMPANHA"], STATUS: ["STATUS", "STATUS_DA_CAMPANHA", "BATEU_META"],
  START_DATE: ["START_DATE", "DATA_INICIAL", "DATA_INICIO"], TOTAL_VISTORIA: ["TOTAL_VISTORIA", "QTD_VISTORIAS"],
  ULTIMA_VISTORIA: ["ULTIMA_VISTORIA_EM", "ULTIMA_VISTORIA"], TOTAL_VALOR: ["TOTAL_VALOR", "VALOR_PREMIADO", "VALOR_PAGO"],
};
function buildFieldMap(headers, fieldDefs) {
  const normHeaders = headers.map((h) => ({ raw: h, n: normKey(h) }));
  const map = {};
  for (const canon of Object.keys(fieldDefs)) {
    const aliases = fieldDefs[canon].map(normKey);
    const found = normHeaders.find((h) => aliases.includes(h.n));
    if (found) map[canon] = found.raw;
  }
  return map;
}

/* =========================================================================
   RISK BUCKETS
   ========================================================================= */
const RISK_BUCKETS = [
  { key: "ativo", label: "Ativo", min: 0, max: 3, color: "#3fa796" },
  { key: "atencao", label: "Atenção", min: 4, max: 7, color: "#6fbf73" },
  { key: "risco", label: "Risco", min: 8, max: 14, color: "#e2a33d" },
  { key: "alto_risco", label: "Alto risco", min: 15, max: 30, color: "#e2543d" },
  { key: "churn", label: "Provável churn", min: 31, max: Infinity, color: "#8b95a5" },
];
function bucketFor(days) { return RISK_BUCKETS.find((b) => days >= b.min && days <= b.max) || RISK_BUCKETS[RISK_BUCKETS.length - 1]; }

/* =========================================================================
   CORE COMPUTATION: VISTORIAS  (lógica idêntica à validada no protótipo React)
   ========================================================================= */
function computeVistoriaAnalysis(rows, fmap) {
  const events = [];
  let dateMin = null, dateMax = null;
  for (const r of rows) {
    const wily = (r[fmap.WILY] || "").toString().trim();
    const dt = parseDateSafe(r[fmap.VISTORIADO_EM]);
    if (!wily || !dt) continue;
    const polo = fmap.POLO ? (r[fmap.POLO] || "").toString().trim() : null;
    const cidade = fmap.CIDADE ? stripAccents((r[fmap.CIDADE] || "").toString().trim()).toUpperCase() : null;
    const categoria = fmap.CATEGORIA ? (r[fmap.CATEGORIA] || "").toString().trim() : null;
    const diagnostico = fmap.DIAGNOSTICO ? (r[fmap.DIAGNOSTICO] || "").toString().trim() : null;
    events.push({ wily, dt, polo, cidade, categoria, diagnostico });
    if (!dateMin || dt < dateMin) dateMin = dt;
    if (!dateMax || dt > dateMax) dateMax = dt;
  }
  events.sort((a, b) => a.dt - b.dt);
  if (!dateMin || !dateMax) return null;

  const dailyMap = new Map(), weeklyMap = new Map(), firstSeen = new Map();
  for (const e of events) {
    const dk = dateKey(e.dt);
    if (!dailyMap.has(dk)) dailyMap.set(dk, { date: dk, count: 0, wilySet: new Set() });
    const dEntry = dailyMap.get(dk); dEntry.count++; dEntry.wilySet.add(e.wily);
    const wk = weekKey(e.dt);
    if (!weeklyMap.has(wk)) weeklyMap.set(wk, { weekStart: wk, count: 0, wilySet: new Set(), newWilySet: new Set() });
    const wEntry = weeklyMap.get(wk); wEntry.count++; wEntry.wilySet.add(e.wily);
    if (!firstSeen.has(e.wily)) firstSeen.set(e.wily, e.dt);
  }
  for (const e of events) {
    if (firstSeen.get(e.wily).getTime() === e.dt.getTime()) weeklyMap.get(weekKey(e.dt)).newWilySet.add(e.wily);
  }
  const daily = Array.from(dailyMap.values()).sort((a, b) => a.date.localeCompare(b.date))
    .map((d) => ({ date: d.date, vistorias: d.count, wilysAtivos: d.wilySet.size }));
  const weekly = Array.from(weeklyMap.values()).sort((a, b) => a.weekStart.localeCompare(b.weekStart))
    .map((w) => ({ weekStart: w.weekStart, label: (() => { const d = new Date(w.weekStart + "T00:00:00"); return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`; })(),
      vistorias: w.count, wilysAtivos: w.wilySet.size, novosWilys: w.newWilySet.size }));

  const perWilyMap = new Map();
  for (const e of events) {
    if (!perWilyMap.has(e.wily)) perWilyMap.set(e.wily, { name: e.wily, first: e.dt, last: e.dt, count: 0, polos: [], cidades: [], eventTimes: [] });
    const p = perWilyMap.get(e.wily);
    p.count++;
    if (e.dt < p.first) p.first = e.dt;
    if (e.dt > p.last) p.last = e.dt;
    if (e.polo) p.polos.push(e.polo);
    if (e.cidade) p.cidades.push(e.cidade);
    p.eventTimes.push(e.dt.getTime());
  }
  const perWily = Array.from(perWilyMap.values()).map((p) => ({
    name: p.name, first: p.first, last: p.last, count: p.count,
    polo: mode(p.polos), cidade: mode(p.cidades), eventTimes: p.eventTimes,
    daysSinceLast: Math.round(daysBetween(p.last, dateMax)),
    tenureDays: daysBetween(p.first, dateMax),
  }));

  const cohortSize = new Map(), cohortMatrix = new Map();
  for (const p of perWily) cohortSize.set(monthKey(p.first), (cohortSize.get(monthKey(p.first)) || 0) + 1);
  for (const e of events) {
    const cm = monthKey(firstSeen.get(e.wily)), em = monthKey(e.dt);
    if (!cohortMatrix.has(cm)) cohortMatrix.set(cm, new Map());
    const inner = cohortMatrix.get(cm);
    if (!inner.has(em)) inner.set(em, new Set());
    inner.get(em).add(e.wily);
  }
  const cohortMonths = Array.from(cohortSize.keys()).sort();
  const cohortTable = cohortMonths.map((cm) => {
    const size = cohortSize.get(cm);
    const inner = cohortMatrix.get(cm) || new Map();
    const cells = cohortMonths.filter((em) => em >= cm).map((em) => {
      const activeCount = inner.has(em) ? inner.get(em).size : 0;
      return { month: em, count: activeCount, pct: size ? (activeCount / size) * 100 : 0 };
    });
    return { cohort: cm, size, cells };
  });

  const WINDOWS = [
    { key: "D1_D7", label: "D1–D7", ini: 0, fim: 7 },
    { key: "D8_D14", label: "D8–D14", ini: 7, fim: 14 },
    { key: "D15_D30", label: "D15–D30", ini: 14, fim: 30 },
    { key: "D31_D60", label: "D31–D60", ini: 30, fim: 60 },
    { key: "D61_D90", label: "D61–D90", ini: 60, fim: 90 },
  ];
  function retentionCurveFor(subsetNames) {
    const subset = subsetNames ? perWily.filter((p) => subsetNames.has(p.name)) : perWily;
    return WINDOWS.map((w) => {
      const eligible = subset.filter((p) => p.tenureDays >= w.fim);
      if (eligible.length === 0) return { ...w, pct: null, n: 0 };
      let activeCount = 0;
      for (const p of eligible) {
        const firstTime = p.first.getTime();
        const hit = p.eventTimes.some((t) => { const diff = (t - firstTime) / DAY_MS; return diff > w.ini && diff <= w.fim; });
        if (hit) activeCount++;
      }
      return { ...w, pct: (activeCount / eligible.length) * 100, n: eligible.length };
    });
  }
  const retentionCurve = retentionCurveFor(null);

  const poloSet = new Set(perWily.map((p) => p.polo).filter(Boolean));
  return { dateMin, dateMax, totalVistorias: events.length, activeWilys: perWily.length,
    daily, weekly, perWily, cohortMonths, cohortTable, retentionCurve, retentionCurveFor,
    poloList: Array.from(poloSet).sort(), firstSeenMap: firstSeen };
}

function computeCadastroMap(rows, fmap) {
  const map = new Map();
  for (const r of rows) {
    const name = normName(r[fmap.NOME_WILLY]);
    if (!name) continue;
    map.set(name, {
      dataCadastro: parseDateSafe(r[fmap.DATA_CADASTRO]),
      totalVistorias: parseNum(r[fmap.TOTAL_VISTORIAS]),
      diasSemVistoria: parseNum(r[fmap.DIAS_SEM_VISTORIA]),
    });
  }
  return map;
}

function categorizeCampaign(name) {
  const n = stripAccents(String(name || "")).toLowerCase();
  if (n.includes("comgas") || n.includes("emergenc")) return "Comgás/Emergencial";
  if (n.includes("ativa")) return "Ativação";
  if (n.includes("recupera")) return "Recuperação";
  if (n.includes("chuva")) return "Retenção (Chuva)";
  if (n.includes("retenc")) return "Retenção";
  if (n.includes("engajamento")) return "Engajamento";
  if (n.includes("regional") || n.includes("reforc")) return "Regional/Reforço";
  if (n.includes("individual")) return "Individual";
  return "Outros";
}
function computeCampaignEpisodes(rows, fmap, perWilyMap, dateMax) {
  const episodes = [];
  for (const r of rows) {
    const fullName = (r[fmap.FULL_NAME] || "").toString().trim();
    const key = normName(fullName);
    if (!fullName || stripAccents(fullName).toLowerCase().includes("teste")) continue;
    const startDate = parseDateSafe(r[fmap.START_DATE]);
    if (!startDate) continue;
    const category = categorizeCampaign(r[fmap.NAME]);
    const wilyAgg = perWilyMap.get(key);
    const observable = dateMax && (startDate.getTime() + 14 * DAY_MS) <= dateMax.getTime();
    let before = null, after = null;
    if (wilyAgg && observable) {
      const startMs = startDate.getTime();
      before = wilyAgg.eventTimes.filter((t) => t >= startMs - 14 * DAY_MS && t < startMs).length;
      after = wilyAgg.eventTimes.filter((t) => t >= startMs && t < startMs + 14 * DAY_MS).length;
    }
    episodes.push({ fullName, category, startDate, before, after, observable: !!(wilyAgg && observable) });
  }
  return episodes;
}

function parseCsvText(text) {
  const res = Papa.parse(text, { header: true, skipEmptyLines: true });
  return { rows: res.data, headers: res.meta.fields || [] };
}
async function fetchLocalCsv(path) {
  const res = await fetch(path + "?t=" + Date.now());
  if (!res.ok) throw new Error(`Não encontrei o arquivo em ${path} (HTTP ${res.status}).`);
  const text = await res.text();
  return parseCsvText(text);
}
async function fetchGoogleSheetCsv(sheetId, gid) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Não consegui ler a planilha (HTTP ${res.status}). Verifique se está compartilhada como "Qualquer pessoa com o link".`);
  const text = await res.text();
  return parseCsvText(text);
}

function renderHeatmap() {
  const a = STATE.vAnalysis;
  const dailyMap = new Map(a.daily.map(d => [d.date, d.vistorias]));
  const start = mondayOfWeek(a.dateMin);
  const end = new Date(a.dateMax); end.setHours(0,0,0,0);
  let cursor = new Date(start), max = 0;
  const weeks = [];
  while (cursor <= end) {
    const col = [];
    for (let i = 0; i < 7; i++) {
      const dk = dateKey(cursor);
      const v = dailyMap.get(dk) || 0;
      const inRange = cursor >= new Date(a.dateMin.getFullYear(), a.dateMin.getMonth(), a.dateMin.getDate()) && cursor <= end;
      if (v > max) max = v;
      col.push({ date: dk, value: v, inRange });
      cursor = new Date(cursor.getTime() + DAY_MS);
    }
    weeks.push(col);
  }
  const colorFor = (v, inRange) => { if (!inRange) return "transparent"; if (v === 0) return "var(--grid-line)"; const t = Math.min(1, v/(max||1)); return `rgba(242,183,5,${(0.15+t*0.85).toFixed(2)})`; };
  const html = `<div class="heatmap-wrap"><div class="heatmap-grid">
    ${weeks.map(col => `<div class="heatmap-col">${col.map(cell => `<div class="heatmap-cell" title="${cell.inRange ? cell.date+': '+cell.value+' vistorias' : ''}" style="background:${colorFor(cell.value,cell.inRange)}"></div>`).join("")}</div>`).join("")}
  </div>
  <div class="heatmap-legend"><span>menos</span>${[0.15,0.35,0.55,0.75,1].map(al => `<div class="heatmap-legend-swatch" style="background:rgba(242,183,5,${al})"></div>`).join("")}<span>mais</span></div>
  </div>`;
  document.getElementById("heatmap-container").innerHTML = html;
}

function renderCohort() {

function computeNovoVeteranoSplit() {
  const a = STATE.vAnalysis;
  if (!a || !STATE.cadMap) return null;
  const corte = a.dateMin;
  const novos = new Set(), veteranos = new Set();
  for (const p of a.perWily) {
    const c = STATE.cadMap.get(normName(p.name));
    if (c && c.dataCadastro) { if (c.dataCadastro >= corte) novos.add(p.name); else veteranos.add(p.name); }
  }
  return { novos, veteranos, curveNovo: a.retentionCurveFor(novos), curveVeterano: a.retentionCurveFor(veteranos) };
}

function renderRetentionChart() {
  const a = STATE.vAnalysis;
  const split = computeNovoVeteranoSplit();
  const ctx = document.getElementById("retention-chart");
  if (charts.retention) charts.retention.destroy();
  const labels = a.retentionCurve.map(w => w.label);
  let datasets;
  if (STATE.novoVeteranoView && split) {
    datasets = [
      { label: "Novo genuíno", data: split.curveNovo.map(w => w.pct), borderColor: "#e2543d", backgroundColor: "#e2543d", tension: 0.25 },
      { label: "Veterano reativado", data: split.curveVeterano.map(w => w.pct), borderColor: "#3fa796", backgroundColor: "#3fa796", tension: 0.25 },
    ];
  } else {
    datasets = [{ label: "Todos", data: a.retentionCurve.map(w => w.pct), borderColor: "#f2b705", backgroundColor: "#f2b705", tension: 0.25 }];
  }
  charts.retention = new Chart(ctx, { type: "line", data: { labels, datasets }, options: { ...chartBaseOptions(), scales: { ...chartBaseOptions().scales, y: { ...chartBaseOptions().scales.y, ticks: { ...chartBaseOptions().scales.y.ticks, callback: (v) => v + "%" } } } } });
}

function renderRiskTable() {
  const a = STATE.vAnalysis;
  const rows = a.perWily.map(p => ({ ...p, bucket: bucketFor(p.daysSinceLast) }))
    .filter(p => p.bucket.key !== "ativo")
    .filter(p => !STATE.riskFilterPolo || p.polo === STATE.riskFilterPolo)
    .filter(p => !STATE.riskFilterBucket || p.bucket.key === STATE.riskFilterBucket)
    .filter(p => !STATE.riskSearch || p.name.toLowerCase().includes(STATE.riskSearch.toLowerCase()))
    .sort((a,b) => b.daysSinceLast - a.daysSinceLast);

  if (rows.length === 0) { tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:20px;">Nenhum Wily nesse filtro.</td></tr>`; return; }

}

  const rb = document.getElementById("risk-bucket");
  if (rb) rb.addEventListener("change", (e) => { STATE.riskFilterBucket = e.target.value; renderRiskTable(); });
}

document.getElementById("gate-input").addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

if (sessionStorage.getItem("wil_retencao_unlocked") === "1") {
  document.getElementById("gate").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  loadAll();
}
</script>
